name: Update Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours (00:00 and 12:00 UTC)

# Avoid overlapping runs racing to push the same file.
concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the PAT so the follow-up push has the same rights that have been
          # writing this file all along (works even with branch protection).
          token: ${{ secrets.DASHBOARD_TOKEN }}

      - name: Generate dashboard
        env:
          # PAT with read access to the org's private repos (repo + read:org).
          # The default GITHUB_TOKEN cannot read sibling repositories.
          GH_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
          ORGANIZATION_NAME: Accessful-AI
          PINNED_REPOS: e2e-suite
          OUTPUT: profile/README.md
        run: python3 scripts/generate_dashboard.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- profile/README.md; then
            echo "Dashboard unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "Update dashboard"
          git push
